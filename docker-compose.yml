version: "3.9"

services:
  auth-service:
    build: .
    container_name: auth-service
    command: npm run dev:auth
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    

  user-service:
    build: .
    container_name: user-service
    command: npm run dev:user
    ports:
      - "5002:5002"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  # contest-service:
  #   build: .
  #   container_name: contest-service
  #   command: npm run dev:contest
  #   ports:
  #     - "5003:5003"
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db

  db:
    image: postgres:16
    container_name: launchpad-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: